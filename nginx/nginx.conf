server {
  server_tokens off;

  client_max_body_size 10M;

  listen 80;
  index index.html;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }

  location / {
    alias /staticfiles/;
    try_files $uri $uri/ /index.html;
  }

  location /static/ {
    alias /staticfiles/static/;
  }

  location /media/ {
    alias /mediafiles/;
  }
}
